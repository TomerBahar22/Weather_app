services:
  web:
    image: tomerbahar2/weather_app-web:latest
    restart: always
    expose:
      - "8000"
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./myapp.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web