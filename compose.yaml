services:
  web:
    build: .
    expose:
      - "8000"
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
  nginx:
    image: nginx:latest
    ports:
      - "9090:443"
    volumes:
      - ./myapp.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web